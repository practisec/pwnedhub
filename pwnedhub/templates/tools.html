{% extends "layout.html" %}
{% block body %}
<div class="page tools">
    <div class="page-header">
        <h3 class="page-title">Tools</h3>
        <p class="page-subtitle">Execute security testing tools from your browser.</p>
    </div>
    <div class="card">
        <div class="tools-control-row">
            <select class="form-select" id="tool" onchange="info(this);">
            {% for tool in tools %}
                <option value="{{ tool.id }}">{{ tool.name }}</option>
            {% endfor %}
            </select>
            <input class="form-input" type="text" id="args" placeholder="Command arguments..." />
            <input class="btn btn-primary" type="button" onclick="execute();" value="Execute" />
        </div>
        <div id="tool-description" class="tool-description"></div>
        <div class="output">
            <pre id="output"></pre>
            <a class="btn-icon" onclick="save_artifact();"><i class="icon fas fa-save" title="Save as artifact"></i></a>
            <div id="spinner" class="spinner"></div>
        </div>
    </div>
</div>
<script nonce="{{ g.nonce }}">
function info(e) {
    var tid = e.options[e.selectedIndex].value;
    $.ajax({
        url: "{{ url_for('core.tools_info', tid='{0}') | urldecode }}".format(tid),
        success: function(data){
            document.getElementById("tool-description").textContent = data.description;
        }
    });
}

function execute() {
    var spinner = document.getElementById("spinner");
    spinner.style.visibility = "visible";
    var tid = document.getElementById("tool").options[document.getElementById("tool").selectedIndex].value;
    var args = document.getElementById("args").value;
    $.ajax({
        url: "{{ url_for('core.tools_execute', tid='{0}') | urldecode }}".format(tid),
        type: "POST",
        data: JSON.stringify({args: args}),
        contentType: "application/json",
        success: function(data){
            spinner.style.visibility = "hidden";
            if (data.error === true) {
                showFlash(data.output);
            } else {
                document.getElementById("output").innerHTML = "$ {0}\n{1}".format(data.cmd, data.output);
            }
        }
    });
}

function save_artifact() {
    var filename = document.getElementById("tool").options[document.getElementById("tool").selectedIndex].text;
    var content = document.getElementById("output").innerHTML;
    if (confirm("Save as an artifact?") == true) {
        $.ajax({
            url: "{{ url_for('core.artifacts_create') }}",
            type: "POST",
            data: "<xml><filename>"+filename+"</filename><content>"+content+"</content></xml>",
            contentType: 'application/xml',
            success: function(data){
                showFlash($(data).find("message").text());
            }
        });
    }
}

document.getElementById("tool").onchange()
</script>
{% endblock %}
