{% extends "layout.html" %}
{% block body %}
<div class="page-centered">
    <div class="card form-card">
        <form class="flex-column" action="{{ url_for('auth.register') }}" method="post">
            <h4 class="card-title">Create an account.</h4>
            <div class="form-group">
                <label class="form-label" for="username">Username<span class="form-required">*</span></label>
                <input class="form-input" name="username" type="text" />
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email<span class="form-required">*</span></label>
                <input class="form-input" name="email" type="text" />
            </div>
            <div class="form-group">
                <label class="form-label" for="name">Display Name<span class="form-required">*</span></label>
                <input class="form-input" name="name" type="text" />
            </div>
            <div class="form-group">
                <label class="form-label" for="avatar">Avatar URL</label>
                <input class="form-input" name="avatar" type="text" />
            </div>
            <div class="form-group">
                <label class="form-label" for="signature">Signature</label>
                <textarea class="form-textarea" name="signature"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password<span class="form-required">*</span></label>
                <div class="flex-column relative">
                    <input class="form-input" id="password" name="password" type="password" />
                    <button type="button" class="input-show-toggle" tabindex="-1" onclick="toggleShow(this);" aria-label="Show password"><i class="fas fa-eye" aria-hidden="true"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="question">Question<span class="form-required">*</span></label>
                <select class="form-select" name="question">
                {% for question in questions %}
                    <option value="{{ question }}">{{ questions[question] }}</option>
                {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="answer">Answer<span class="form-required">*</span></label>
                <input class="form-input" name="answer" type="text" />
            </div>
            <input class="btn btn-primary" type="submit" value="Register" onclick="cleanSubmit(event, this.form);" />
        </form>
    </div>
</div>
{% endblock %}
