{% extends "layout.html" %}
{% block body %}
<div class="page-centered profile">
    <div class="card form-card">
        <div class="profile-header">
            <a class="profile-avatar" href="{{ url_for('core.profile_view', uid=user.id) }}">
                <img class="circular bordered-dark" src="{{ user.avatar_or_default|safe }}" title="View public profile" />
            </a>
            <dl class="profile-meta">
                <dt>Username</dt>
                <dd>{{ user.username }}</dd>
                <dt>Email</dt>
                <dd>{{ user.email }}</dd>
            </dl>
        </div>
        <form class="flex-column" action="{{ url_for('core.profile') }}" method="post">
            <h5 class="form-section-title">Profile</h5>
            <div class="form-group">
                <label class="form-label" for="name">Display Name<span class="form-required">*</span></label>
                <input class="form-input" name="name" type="text" value="{{ user.name }}" />
            </div>
            <div class="form-group">
                <label class="form-label" for="avatar">Avatar URL</label>
                <input class="form-input" name="avatar" type="text" value="{{ user.avatar or '' }}" />
            </div>
            <div class="form-group">
                <label class="form-label" for="signature">Signature</label>
                <textarea class="form-textarea" name="signature">{{ user.signature }}</textarea>
            </div>

            <h5 class="form-section-title">Security</h5>
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <div class="flex-column relative">
                    <input class="form-input" id="password" name="password" type="password" />
                    <button type="button" class="input-show-toggle" tabindex="-1" onclick="toggleShow(this);" aria-label="Show password"><i class="fas fa-eye" aria-hidden="true"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="question">Question<span class="form-required">*</span></label>
                <select class="form-select" name="question">
                {% for question in questions %}
                    <option value="{{ question }}"{% if question == user.question %} selected{% endif %}>{{ questions[question] }}</option>
                {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="answer">Answer<span class="form-required">*</span></label>
                <input class="form-input" name="answer" type="text" value="{{ user.answer }}" />
            </div>
            <input name="csrf_token" type="hidden" value="{{ csrf_token() }}" />
            <input class="btn btn-primary" type="submit" value="Submit" onclick="cleanSubmit(event, this.form);" />
        </form>
    </div>
</div>
{% endblock %}
