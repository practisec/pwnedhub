{% extends "layout.html" %}
{% block body %}
<div class="page-centered">
    <div class="card form-card">
    {% if app_config('OOB_RESET_ENABLE') %}
        <form class="flex-column" action="{{ url_for('auth.reset_password_oob', token=token) }}" method="post">
    {% else %}
        <form class="flex-column" action="{{ url_for('auth.reset_password') }}" method="post">
    {% endif %}
            <h4 class="card-title">Welcome back!</h4>
            <div class="form-group">
                <label class="form-label" for="password">New Password for {{ user.name }}</label>
                <div class="flex-column relative">
                    <input class="form-input" id="password" name="password" type="password" />
                    <button type="button" class="input-show-toggle" tabindex="-1" onclick="toggleShow(this);" aria-label="Show password"><i class="fas fa-eye" aria-hidden="true"></i></button>
                </div>
            </div>
            <input class="btn btn-primary" type="submit" value="Submit" onclick="cleanSubmit(event, this.form);" />
        </form>
    </div>
</div>
{% endblock %}
