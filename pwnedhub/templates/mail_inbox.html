{% extends "layout.html" %}
{% block body %}
<div class="page inbox">
    <div class="page-header flex-row flex-justify-space-between flex-align-center">
        <h3 class="page-title no-margin-bottom">PwnMail</h3>
        <a class="btn btn-primary" href="{{ url_for('core.mail_compose') }}">Compose</a>
    </div>
    {% if mail|length > 0 %}
    <div class="list">
        {% for letter in mail %}
        <div class="list-item list-item-clickable{% if letter.read == 0 %} list-item-unread{% endif %}" onclick="cleanRedirect(event, '{{ url_for('core.mail_view', mid=letter.id) }}');">
            <div class="list-item-primary flex-row flex-align-center">
                <span class="list-item-sender">{{ letter.sender.name }}</span>
                <span class="list-item-subject">{{ letter.subject }}</span>
            </div>
            <div class="list-item-secondary">{{ letter.created_as_string }}</div>
            <div class="list-item-actions">
                <a class="btn-icon" onclick="event.stopPropagation(); cleanRedirect(event, '{{ url_for('core.mail_reply', mid=letter.id) }}');"><i class="icon fas fa-reply" title="Reply"></i></a>
                <a class="btn-icon" onclick="event.stopPropagation(); cleanRedirect(event, '{{ url_for('core.mail_delete', mid=letter.id) }}');"><i class="icon fas fa-trash" title="Delete"></i></a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="list">
        <div class="list-empty">
            <i class="icon icon-md fas fa-inbox" title="Empty inbox"></i>
            <p>Your inbox is empty.</p>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
