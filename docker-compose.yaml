services:

    # `app` carries the build for the shared base image (./Dockerfile); every
    # other app service just references the resulting `pwnedhub-base` tag. Build
    # it with `docker compose build` (or `docker compose up --build`). Each
    # service installs its own REQUIREMENTS.txt at start — the base only carries
    # the OS/system layer, so a dependency change just needs a restart.
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: pwnedhub-base
        expose:
            - 80
        volumes:
            - .:/src
            - ~/tmp:/tmp
        environment:
            - TZ=America/New_York
            - CONFIG=Production
            - DATABASE_HOST=db
            - REDIS_URL=redis://redis:6379/0
            - FLASK_APP=pwnedhub/wsgi.py
        command: sh -c "pip3 install --no-cache-dir -r pwnedhub/REQUIREMENTS.txt pytest==9.1.1 && gunicorn --workers 10 --bind 0.0.0.0:80 pwnedhub.wsgi:app --error-logfile - --log-level DEBUG"
        depends_on:
            - db
            - redis

    sso:
        image: pwnedhub-base
        expose:
            - 80
        volumes:
            - .:/src
        environment:
            - TZ=America/New_York
            - CONFIG=Production
            - DATABASE_HOST=db
        command: sh -c "pip3 install --no-cache-dir -r pwnedsso/REQUIREMENTS.txt pytest==9.1.1 && gunicorn --workers 10 --bind 0.0.0.0:80 pwnedsso.wsgi:app --error-logfile - --log-level DEBUG"
        depends_on:
            - db

    spa:
        image: pwnedhub-base
        expose:
            - 80
        volumes:
            - .:/src
        environment:
            - CONFIG=Production
        command: sh -c "pip3 install --no-cache-dir -r pwnedspa/REQUIREMENTS.txt && gunicorn --workers 10 --bind 0.0.0.0:80 pwnedspa.wsgi:app --error-logfile - --log-level DEBUG"

    api:
        image: pwnedhub-base
        expose:
            - 80
        volumes:
            - .:/src
        environment:
            - TZ=America/New_York
            - CONFIG=Production
            - DATABASE_HOST=db
            - REDIS_URL=redis://redis:6379/0
            - FLASK_APP=pwnedapi/wsgi.py
        command: sh -c "pip3 install --no-cache-dir -r pwnedapi/REQUIREMENTS.txt pytest==9.1.1 && gunicorn --workers 1 --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --bind 0.0.0.0:80 pwnedapi.wsgi:app --error-logfile - --log-level DEBUG"
        depends_on:
            - db
            - redis

    api-worker:
        image: pwnedhub-base
        volumes:
            - .:/src
        environment:
            - TZ=America/New_York
            - CONFIG=Production
            - DATABASE_HOST=db
            - REDIS_URL=redis://redis:6379/0
        command: sh -c "pip3 install --no-cache-dir -r pwnedapi/REQUIREMENTS.txt && rq worker -u redis://redis:6379/0 pwnedapi-tasks"
        depends_on:
            - db
            - redis

    admin:
        image: pwnedhub-base
        expose:
            - 80
        volumes:
            - .:/src
        environment:
            - TZ=America/New_York
            - CONFIG=Production
            - DATABASE_HOST=db
            - FLASK_APP=pwnedadmin/wsgi.py
        command: sh -c "pip3 install --no-cache-dir -r pwnedadmin/REQUIREMENTS.txt pytest==9.1.1 && gunicorn --workers 10 --bind 0.0.0.0:80 pwnedadmin.wsgi:app --error-logfile - --log-level DEBUG"
        depends_on:
            - db

    bot-worker:
        image: pwnedhub-base
        volumes:
            - .:/src
            - ~/tmp:/tmp
        command: sh -c "pip3 install --no-cache-dir -r adminbot/REQUIREMENTS.txt && rq worker -u redis://redis:6379/0 adminbot-tasks"
        depends_on:
            - redis

    proxy:
        image: nginx:alpine
        ports:
            - 80:80
        networks:
            default:
                aliases:
                    - www.pwnedhub.com
                    - sso.pwnedhub.com
                    - test.pwnedhub.com
                    - api.pwnedhub.com
                    - admin.pwnedhub.com
        volumes:
            - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./proxy/proxy_params:/etc/nginx/proxy_params:ro
        depends_on:
            - app
            - sso
            - spa
            - api
            - admin

    db:
        image: mysql
        command: --skip-auto-generate-certs
        environment:
            - MYSQL_ROOT_PASSWORD=adminpass
        volumes:
            - ./database/init:/docker-entrypoint-initdb.d:ro

    redis:
        image: redis
